<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <!-- IRONLAND Logo - High Quality Horizontal Version -->
  
  <!-- Logo Icon Group -->
  <g transform="translate(15, 20)">
    <!-- Left geometric shape (represents 'I') -->
    <polygon 
      points="0,15 30,5 30,75 0,85" 
      fill="#E6261F"
      shape-rendering="geometricPrecision"
    />
    <!-- Right geometric shape (represents 'L') -->
    <polygon 
      points="35,10 65,0 65,80 35,70" 
      fill="#E6261F"
      shape-rendering="geometricPrecision"
    />
  </g>
  
  <!-- Brand Name - IRONLAND -->
  <!-- Using system fonts that match the bold industrial style -->
  <text 
    x="100" 
    y="78" 
    font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif" 
    font-size="56" 
    font-weight="900"
    fill="#000000"
    letter-spacing="3"
    text-rendering="optimizeLegibility"
  >IRONLAND</text>
  
  <!-- Optional: Subtle underline accent -->
  <rect x="100" y="88" width="380" height="4" fill="#E6261F" rx="2"/>
</svg>