<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- IRONLAND Logo - Horizontal Version -->
  
  <!-- Logo Icon - Geometric IL Design -->
  <g transform="translate(10, 10)">
    <!-- Left shape (I) -->
    <polygon points="0,10 25,0 25,70 0,80" fill="#E6261F"/>
    <!-- Right shape (L) -->
