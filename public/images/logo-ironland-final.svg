<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <!-- IRONLAND Logo - Horizontal Version (from AI source) -->
  
  <!-- Logo Icon - IL Geometric Design -->
  <g transform="translate(20, 20)">
    <!-- Left shape (I) - angled parallelogram -->
    <polygon 
      points="0,15 28,5 28,75 0,85" 
      fill="#E6261F"
      shape-rendering="geometricPrecision"
    />
    <!-- Right shape (L) - with distinctive angle -->
    <polygon 
      points="33,10 61,0 61,80 33,70" 
      fill="#E6261F"
      shape-rendering="geometricPrecision"
    />
    <!-- Connection detail - subtle white gap creating arrow effect -->
    <polygon 
      points="28,5 33,10 30,42.5 28,40" 
      fill="#FFFFFF"
      opacity="0.3"
    />
  </g>
  
  <!-- Brand Name - IRONLAND -->
  <text 
    x="110" 
    y="75" 
    font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif" 
    font-size="52" 
    font-weight="900"
    fill="#000000"
    letter-spacing="4"
    text-rendering="optimizeLegibility"
  >IRONLAND</text>
  
  <!-- Optional: Tagline or decorative element -->
  <rect x="110" y="88" width="460" height="3" fill="#E6261F" rx="1.5"/>
</svg>